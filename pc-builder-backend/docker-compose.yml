services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pcbuilder:pcbuilder@db:5432/pcbuilder
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      RUN_MIGRATIONS: "true"
      RUN_SEED: "true"
      AUTO_CREATE_TABLES: "false"
      STARTER_SNAPSHOT_ENABLED: "true"
      STARTER_SNAPSHOT_PATH: data/starter-snapshot-pl-2026-07-15.json
      PRUNE_INCOMPLETE_CATALOG: "true"
      OPEN_ICECAT_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/live')"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: .
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "worker", "--loglevel=INFO", "--queues=parsers,maintenance,notifications"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pcbuilder:pcbuilder@db:5432/pcbuilder
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      AUTO_CREATE_TABLES: "false"
      OPEN_ICECAT_ENABLED: "true"
    depends_on:
      api:
        condition: service_healthy

  beat:
    build: .
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "beat", "--loglevel=INFO"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pcbuilder:pcbuilder@db:5432/pcbuilder
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      AUTO_CREATE_TABLES: "false"
      OPEN_ICECAT_ENABLED: "true"
    depends_on:
      api:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: pcbuilder
      POSTGRES_USER: pcbuilder
      POSTGRES_PASSWORD: pcbuilder
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcbuilder -d pcbuilder"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
