services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    env_file: .env.production
    environment:
      RUN_MIGRATIONS: "false"
      AUTO_CREATE_TABLES: "false"
      SEED_DEMO_DATA: "false"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    env_file: .env.production
    environment:
      RUN_MIGRATIONS: "false"
      AUTO_CREATE_TABLES: "false"
      SEED_DEMO_DATA: "false"
      RUN_SEED: "false"
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build: .
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "worker", "--loglevel=INFO", "--queues=parsers,maintenance,notifications", "--concurrency=4"]
    env_file: .env.production
    environment:
      AUTO_CREATE_TABLES: "false"
      SEED_DEMO_DATA: "false"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build: .
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "beat", "--loglevel=INFO"]
    env_file: .env.production
    environment:
      AUTO_CREATE_TABLES: "false"
      SEED_DEMO_DATA: "false"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    env_file: .env.production
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
